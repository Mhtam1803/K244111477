<html>
    <head>
        <title>Page Title</title>
    </head>
    <body style="background-color: rgb(178, 249, 249);">
        <div align="center">
            <p><img src="images/delong.jpg"></p>
        </div> 
        <form>
            <h2 style="color: black;"> Travel Expense Report </h2>
            <hr/>
            <table>
            <tr>
                <td>1) First Name:</td>
                <td>
                    <input type="text" name="First_Name" id="First_Name" style="width:110px">
                    Last Name:
                    <input type="text" name="Last_Name" id="Last_Name">
                </td>
            </tr>
            <tr>
                <td>2) Social Security Number:</td>
                <td>
                    <input type="text" name="SSN" id="SSN">
                </td>
            </tr>
            <tr>
                <td>3) Department:</td>
                <td>
                <select name="department" id="department" onchange="departmentForm.selectedDepartment.value=this.value; departmentForm.selectedDepartmentName.value=this.options[this.selectedIndex].text">
                    <option value="">Accounting</option>
                    <option value="IT">IT</option>
                    <option value="HR">HR</option>
                    <option value="Finance">Finance</option>
                </select>
            </td>
            </tr>
            <tr>
                <td>4)Describe the purpose of Trip:</td>
            </tr>
            <tr>
                <td colspan="4">
                    <input type="text" name="Purpose_of_Trip" id="Purpose_of_Trip" style="width: 500px;height: 100px;">
                </td>
            </tr>
            <tr>
                <td colspan="2">5) Itemize your travel expenses
                    <table border="1" style="margin: 0 auto;">
                        <tr style="text-align:center;">
                            <td width="50px">Date</td>
                            <td width="200px">Description</td>
                            <td width="80px">Category</td>
                            <td width="50px">Amount</td>
                        </tr>
                        <tr>
                            <td><input type="date" name="Date1" id="Date1"></td>
                            <td><input type="text" name="Description1" id="Description1"></td>
                            <td><select name="Category1" id="Category1">
                                <option value="Transportation">Transportation</option>
                                <option value="Accommodation">Accommodation</option>
                                <option value="Meals">Meals</option>
                            </select></td>
                            <td><input type="number" name="Amount1" id="Amount1" step="1.0"></td>
                        </tr>
                        <tr>
                            <td><input type="date" name="Date2" id="Date2"></td>
                            <td><input type="text" name="Description2" id="Description2"></td>
                            <td><select name="Category2" id="Category2">
                                <option value="Transportation">Transportation</option>
                                <option value="Accommodation">Accommodation</option>
                                <option value="Meals">Meals</option>
                            </select></td>
                            <td><input type="number" name="Amount2" id="Amount2" step="1.0"></td>
                        </tr>
                        <tr>
                            <td><input type="date" name="Date3" id="Date3"></td>
                            <td><input type="text" name="Description3" id="Description3"></td>
                            <td><select name="Category3" id="Category3">
                                <option value="Transportation">Transportation</option>
                                <option value="Accommodation">Accommodation</option>
                                <option value="Meals">Meals</option>
                            </select></td>
                            <td><input type="number" name="Amount3" id="Amount3" step="1.0"></td>
                        </tr>
                        <tr>
                            <td><input type="date" name="Date4" id="Date4"></td>
                            <td><input type="text" name="Description4" id="Description4"></td>
                            <td><select name="Category4" id="Category4">
                                <option value="Transportation">Transportation</option>
                                <option value="Accommodation">Accommodation</option>
                                <option value="Meals">Meals</option>
                            </select></td>
                            <td><input type="number" name="Amount4" id="Amount4" step="1.0"></td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr>
                <td colspan="2">6) Have you submitted your receipts?
                    <input type="radio" name="Receipts" id="ReceiptsYes" value="Yes">
                    <label for="ReceiptsYes">Yes</label>
                    <input type="radio" name="Receipts" id="ReceiptsNo" value="No">
                    <label for="ReceiptsNo">No</label>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <button type="submit">Submit travel expenses</button>
                    <button type="reset">Reset</button>
                </td>
            </tr>
            <tr>
                <td colspan="2">Question? Contact Debbie Larson in Accounting (ext. 2150)</td>
            </tr>
        </table>
        </form>
    </body>
</html>

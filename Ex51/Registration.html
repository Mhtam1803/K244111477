<html>
    <head>
        <title>Page Title</title>
    </head>
    <body style="background-color: rgb(35, 127, 135);">
        <div align="center">
            <p><img src="images/logo.gif"></p>
        </div> 
        <form>
            <H1 style ="color: white;text-align:center">Newborn Registration </H1>
            <br/>
            <table style="border-collapse: separate; border-spacing: 0 15px;">
                <tr  style ="color: white;">
                    <td>Date
                    <input type="date" name="Date" id="Date">
                    </td>
                </tr>
                <tr style ="color: white;">
                    <td>1) Infant's first Name
                    <input type="text" name="First_Name" id="First_Name">
                    Last: 
                    <input type="text" name="Last_Name" id="Last_Name">
                    </td>
                </tr>
                <tr style ="color: white;">
                    <td>2) Medical Record #:
                        <input type="text" name="Medical_Record" id="Medical_Record">
                    </td>
                </tr>
                <tr style ="color: white;">
                    <td>
                        3)Date of Birth:
                        <input type="date" name="DOB" id="DOB">
                    </td>
                </tr>
                <tr style ="color: white;">
                    <td>4) Birth weight:
                    <input type="text" name="Birth_Weight" id="Birth_Weight">
                    </td>
                </tr>
                <tr style ="color: white;">
                    <td>
                        5) APGAR score:
                        <input type="text" name="APGAR_Score" id="APGAR_Score">
                    </td>
                </tr>
                <tr style ="color: white;">
                    <td>
                        6) Mother's first Name
                        <input type="text" name="Mother_First_Name" id="Mother_First_Name">
                        Last: 
                        <input type="text" name="Mother_Last_Name" id="Mother_Last_Name">
                    </td>
                </tr>
                <tr style ="color: white;">
                    <td>
                        7) Father's first Name
                        <input type="text" name="Father_First_Name" id="Father_First_Name"> 
                        Last: 
                        <input type="text" name="Father_Last_Name" id="Father_Last_Name">   
                    </td>
                </tr>
                <tr style ="color: white;">
                    <td style="text-align: top;">
                        8) Physician(Check all that apply):
                        <select name="Physician" id="Physician" multiple>
                            <option value="Dr. Smith">Dr. Smith</option>
                            <option value="Dr. Johnson">Dr. Johnson</option>
                            <option value="Dr. Lee">Dr. Lee</option>
                            <option value="Dr. Brown">Dr. Brown</option>
                        </select>
                    </td>
                </tr>
                <tr></tr>
                <tr></tr>
                <td style="text-align: center;">
                       <button type="submit" value="Submit">Register</button>
                        <button type="reset" value="Cancel">Reset</button>
                    </td>
                </tr>
            </table>
        </form>
    </body>
</html>

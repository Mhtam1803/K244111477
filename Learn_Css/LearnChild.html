<html>
    <head>
        <title> Tiêu đề trang</title>
        <style>
            ul>li {
                color: red;
            }
            ul li ul li{
                color: green;
            }
        </style>
    </head>
    <body>
        <ul>
            <li>Danh sách 1</li>
            <li>Danh sách 2
                <ul>
                    <li>Danh sách 2.1</li>
                    <li>Danh sách 2.2</li>
                    <li>Danh sách 2.3</li>
                </ul>
            </li>
            <li>Danh sách 3</li>
            <ol>
                <li>Danh sách 3.1</li>
                <li>Danh sách 3.2</li>
                <li>Danh sách 3.3</li>
            </ol>
        </ul>
    </body>
</html>

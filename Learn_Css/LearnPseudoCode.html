<html>
    <head>
        <title>Tiêu đề trang</title>
        <style type="text/css"> 
            a:link{
                color: blue;
            }
            a:visited{
                color: red;
                font-style: italic;
            }
            a:hover{
                color: purple;
                font-weight: bold;
            }
            a#myfaculty:active{
                color: green;
            }
            tbody tr:nth-child(odd){
                background-color: lightblue;
            }
            tbody tr:nth-child(even){
                    background-color: pink;
            }
            tbody tr:hover{
                background-color: yellow;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h3>Faculty of Information Systems</h3>
        <a id="myfaculty" href="https://is.uel.edu.vn">Visit our website</a>
        <h3>
            <a href="https://is.uel.edu.vn">Visit our website</a>
        </h3>
        <table border="1">
        <caption>List of Products</caption>

                <th>Product ID</th>
                <th>Product Name</th>
                <th>Product Price</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>001</td>
                <td>Product 1</td>
                <td>$10</td>
            </tr>
            <tr>
                <td>002</td>
                <td>Product 2</td>
                <td>$20</td>
            </tr>
            <tr>
                <td>003</td>
                <td>Product 3</td>
                <td>$30</td>
            </tr>
            <tr>
                <td>004</td>

            <tr>

    </body>
</html>

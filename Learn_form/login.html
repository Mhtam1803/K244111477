<html>
    <head>
        <title> Tiêu đề trang</title>
    </head>
    <body>
       <div style="width: 500px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); text-align: center;">
    Welcome to Login Page
        <form
            action="process.html"
            method="get"
            name='loginForm'>
            <table border="1" width="400" cellpadding="10" cellspacing="0" align="center">
                <tr>
                    <td rowspan="7">
                        <img src="/Learn_form/images/enter.png" alt="Admin Image" width="200" height="250">
                    </td>
                </tr>
                <tr>
                    <td style="text-align: center; font-size: 24px; font-weight: bold;">
                        Login System
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="username">User Name</label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="text" name="username" id="username" value="obama" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="password">Password</label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="password" name="password" id="password" value="123456" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="remember">
                            <input type="checkbox" name="remember" id="remember" value="remember">
                            Remember Me
                        </label>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;">
                        <input type="submit" value="Login" style="background-image: url('images/log-in.png');">

                        <input type="reset" value="Reset">
                    </td>
                </tr>
            </table>
        </form>
    </div>

    </body>
</html>

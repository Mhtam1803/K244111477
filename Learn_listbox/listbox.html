<html>
    <head>
        <title> Tiêu đề trang</title>
    </head>
    <body>
        <form name="colorForm">
            <h3>Select background color:</h3>
            <select id="colorSelect" name="colorSelect" size="5" onchange="colorForm.selectedColor.value = this.value; colorForm.selectedColor.style.backgroundColor = this.value;">
                <option value="Red">Red</option>
                <option value="Green">Green</option>
                <option value="Blue">Blue</option>
                <option value="Yellow">Yellow</option>
                <option value="Orange">Orange</option>
            </select>
            <p>Your selected color is:</p>
            <input type="text" id="selectedColor" name="selectedColor">
        </form>
        <form name ="imgForm">
            <h3>Select an image:</h3>
            <select id="imageSelect" name="imageSelect" size="5" onchange="imgForm.selectedImage.value = ''; imgForm.selectedImage.style.backgroundImage = 'url(' + this.value + ')';">
                <option value="images/logo_uel.png">Logo UEL</option>
                <option value="images/logo_vnu.png">Logo VNU</option>
                <option value="images/my_avt.png">My Avatar</option>
            </select>
            <p>Your selected image is:</p>
            <input type="text" id="selectedImage" name="selectedImage" readonly value="" style="width: 300px; height: 200px; background-size: cover; background-position: center; background-repeat: no-repeat; border: 1px solid #ccc;" />

    </body>
</html>
